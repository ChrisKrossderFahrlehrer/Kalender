<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Fahrschule Kalender</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f0f; --surface:#1a1a1a; --surface2:#242424; --border:#2e2e2e;
  --accent:#d4a843; --accent2:#e8c878; --text:#f0ede8; --text-muted:#888;
  --danger:#e05555; --success:#5bba7a; --radius:10px;
  --font-display:'DM Serif Display',serif; --font-body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;font-size:15px;}

/* ── Auth ── */
#auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 60% 20%,#1e1608 0%,#0f0f0f 60%);}
.auth-box{width:400px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:36px;}
.auth-logo{font-family:var(--font-display);font-size:26px;color:var(--accent);margin-bottom:4px;}
.auth-sub{color:var(--text-muted);font-size:13px;margin-bottom:28px;}
.auth-tabs{display:flex;gap:4px;background:var(--surface2);border-radius:8px;padding:4px;margin-bottom:22px;}
.auth-tab{flex:1;padding:7px;border:none;background:transparent;color:var(--text-muted);border-radius:6px;cursor:pointer;font-family:var(--font-body);font-size:13px;font-weight:500;transition:all .2s;}
.auth-tab.active{background:var(--accent);color:#0f0f0f;}

/* ── Forms ── */
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}
.field input,.field select,.field textarea{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border .2s;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);}
.field select option{background:#1a1a1a;}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 18px;border:none;border-radius:8px;font-family:var(--font-body);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none;}
.btn-primary{background:var(--accent);color:#0f0f0f;} .btn-primary:hover{background:var(--accent2);}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border);} .btn-secondary:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger);} .btn-danger:hover{background:var(--danger);color:#fff;}
.btn-success{background:var(--success);color:#0f0f0f;}
.btn-full{width:100%;justify-content:center;} .btn-sm{padding:5px 11px;font-size:12px;}

/* ── App Layout ── */
#app{display:none;min-height:100vh;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-brand{font-family:var(--font-display);font-size:19px;color:var(--accent);}
.topbar-role{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-muted);background:var(--surface2);padding:3px 9px;border-radius:20px;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.topbar-user{font-size:12px;color:var(--text-muted);}
.layout{display:flex;flex:1;}
.sidebar{width:210px;min-height:calc(100vh - 56px);background:var(--surface);border-right:1px solid var(--border);padding:16px 10px;flex-shrink:0;}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:8px;color:var(--text-muted);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left;}
.nav-item:hover,.nav-item.active{background:var(--surface2);color:var(--text);}
.nav-item.active{color:var(--accent);}
.nav-icon{font-size:15px;width:18px;text-align:center;}
.nav-section{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-muted);padding:12px 12px 4px;margin-top:4px;}
.main{flex:1;padding:28px;overflow-y:auto;}
.page-title{font-family:var(--font-display);font-size:26px;color:var(--text);margin-bottom:20px;}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px;margin-bottom:16px;}
.card-title{font-size:13px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}

/* ── Stat Cards ── */
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 20px;}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin-bottom:6px;}
.stat-val{font-family:var(--font-display);font-size:30px;}

/* ── Table ── */
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:7px 11px;border-bottom:1px solid var(--border);}
td{padding:11px;border-bottom:1px solid rgba(46,46,46,.5);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}

/* ── Kalender ── */
.cal-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.cal-month{font-family:var(--font-display);font-size:20px;flex:1;}
.cal-view-toggle{display:flex;gap:3px;background:var(--surface2);border-radius:7px;padding:3px;}
.cal-view-btn{padding:5px 12px;border:none;background:transparent;color:var(--text-muted);border-radius:5px;cursor:pointer;font-family:var(--font-body);font-size:12px;font-weight:500;transition:all .2s;}
.cal-view-btn.active{background:var(--accent);color:#0f0f0f;}
.cal-day-label{text-align:center;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);padding:6px 0;}
.cal-day{min-height:76px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:6px;cursor:pointer;transition:border .2s;position:relative;}
.cal-day:hover{border-color:var(--accent);}
.cal-day.other-month{opacity:.3;}
.cal-day.today{border-color:var(--accent);}
.cal-day.blocked{background:rgba(224,85,85,.07);border-color:rgba(224,85,85,.3);}
.cal-day.urlaub-day{background:rgba(91,186,122,.06);border-color:rgba(91,186,122,.3);}
.cal-day.feiertag-day{background:rgba(212,168,67,.06);border-color:rgba(212,168,67,.3);}
.cal-day-num{font-size:11px;font-weight:600;margin-bottom:3px;color:var(--text-muted);}
.cal-day.today .cal-day-num{color:var(--accent);}
.cal-slot{font-size:9px;border-radius:3px;padding:2px 4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;}
.slot-booked{opacity:.6;}
.cal-day.urlaub-day,.cal-day.feiertag-day{pointer-events:all;}

/* ── Week View ── */
.week-cell{border-right:1px solid rgba(46,46,46,.3);border-bottom:1px solid rgba(46,46,46,.3);height:44px;position:relative;cursor:pointer;transition:background .15s;}
.week-cell:hover{background:rgba(212,168,67,.04);}
.week-time-label{font-size:9px;color:var(--text-muted);text-align:right;padding-right:6px;border-right:1px solid var(--border);border-bottom:1px solid rgba(46,46,46,.4);height:44px;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:2px;}
.week-slot-chip{position:absolute;left:2px;right:2px;border-radius:3px;padding:2px 4px;font-size:9px;font-weight:600;overflow:hidden;z-index:2;}
.week-col-header{text-align:center;padding:8px 3px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:11px;font-weight:600;}
.week-col-header.today-col{color:var(--accent);}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:28px;width:440px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-title{font-family:var(--font-display);font-size:20px;margin-bottom:18px;}
.modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:none;color:var(--text-muted);width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}

/* ── Badges ── */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.badge-booked{background:rgba(91,186,122,.15);color:var(--success);}
.badge-free{background:rgba(212,168,67,.12);color:var(--accent);}
.badge-bestanden{background:rgba(91,186,122,.18);color:#5bba7a;}
.badge-nicht-bestanden{background:rgba(224,85,85,.18);color:#e05555;}
.badge-ausstehend{background:rgba(212,168,67,.15);color:var(--accent);}

/* ── Slot Row ── */
.slot-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--surface2);border-radius:8px;margin-bottom:7px;flex-wrap:wrap;}
.slot-time{font-weight:600;font-size:14px;min-width:90px;}
.slot-info{flex:1;}
.slot-student{font-size:12px;color:var(--text-muted);margin-top:2px;}

/* ── Auto Card ── */
.auto-card{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:7px;flex-wrap:wrap;}
.auto-icon{font-size:22px;}
.auto-info{flex:1;}
.auto-name{font-weight:600;font-size:13px;}
.auto-detail{font-size:11px;color:var(--text-muted);margin-top:2px;}
.auto-kennzeichen{font-family:monospace;font-size:12px;font-weight:700;background:#f0ede8;color:#0f0f0f;padding:2px 7px;border-radius:4px;border:1.5px solid #555;letter-spacing:.05em;}

/* ── Prüfung ── */
.pruefung-card{display:flex;align-items:center;gap:12px;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px 14px;margin-bottom:7px;flex-wrap:wrap;}
.pruefung-status{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.pruefung-info{flex:1;min-width:140px;}
.pruefung-title{font-weight:600;font-size:13px;}
.pruefung-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}

/* ── Notizen ── */
.notiz-block{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:13px;margin-bottom:8px;}
.notiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.notiz-author{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.04em;}
.notiz-date{font-size:10px;color:var(--text-muted);}
.notiz-text{font-size:13px;line-height:1.6;white-space:pre-wrap;}
.notiz-compose{background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:13px;}
.notiz-compose textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font-body);font-size:13px;padding:9px 12px;resize:vertical;min-height:72px;outline:none;transition:border .2s;}
.notiz-compose textarea:focus{border-color:var(--accent);}

/* ── Warteliste ── */
.warteliste-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;flex-wrap:wrap;}
.warteliste-name{flex:1;font-weight:500;font-size:13px;}
.warteliste-meta{font-size:11px;color:var(--text-muted);}

/* ── Typ Rows ── */
.type-row{display:flex;align-items:center;gap:10px;padding:10px 13px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:7px;flex-wrap:wrap;}
.type-row-name{flex:1;font-weight:500;font-size:13px;}
.type-row-id{font-size:10px;color:var(--text-muted);font-family:monospace;}
.preset-colors{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.preset-color{width:26px;height:26px;border-radius:5px;cursor:pointer;border:2px solid transparent;transition:border .15s;}
.preset-color:hover{border-color:var(--text);}

/* ── Auslastung ── */
.auslastung-bar-wrap{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.auslastung-label{min-width:130px;font-size:13px;font-weight:500;}
.auslastung-bar-bg{flex:1;height:9px;background:var(--surface2);border-radius:20px;overflow:hidden;}
.auslastung-bar-fill{height:100%;border-radius:20px;transition:width .4s;}
.auslastung-val{min-width:55px;text-align:right;font-size:11px;color:var(--text-muted);}

/* ── Email Banner ── */
.email-banner{background:linear-gradient(135deg,rgba(212,168,67,.12),rgba(212,168,67,.04));border:1px solid rgba(212,168,67,.3);border-radius:11px;padding:18px 22px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.email-banner-icon{font-size:26px;flex-shrink:0;}
.email-banner-text{flex:1;min-width:180px;}
.email-banner-title{font-weight:600;font-size:13px;margin-bottom:3px;}
.email-banner-sub{font-size:11px;color:var(--text-muted);}
.email-banner-input{display:flex;gap:7px;align-items:center;flex-shrink:0;}
.email-banner-input input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:7px 12px;color:var(--text);font-family:var(--font-body);font-size:12px;outline:none;transition:border .2s;width:200px;}
.email-banner-input input:focus{border-color:var(--accent);}
.email-saved{color:var(--success);font-size:12px;font-weight:500;}

/* ── Booking Screen ── */
#booking-screen{min-height:100vh;background:radial-gradient(ellipse at 30% 70%,#0d1520 0%,#0f0f0f 60%);display:none;flex-direction:column;align-items:center;padding:36px 16px 80px;}
.booking-header{text-align:center;margin-bottom:32px;}
.booking-logo{font-family:var(--font-display);font-size:28px;color:var(--accent);}
.booking-sub{color:var(--text-muted);margin-top:6px;font-size:14px;}
.booking-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:680px;padding:24px;margin-bottom:16px;}
.booking-card-title{font-family:var(--font-display);font-size:17px;margin-bottom:14px;}

/* ── Toast ── */
#toast{position:fixed;bottom:22px;right:22px;z-index:10000;background:var(--surface2);border:1px solid var(--border);border-radius:9px;padding:12px 18px;max-width:300px;transform:translateY(80px);opacity:0;transition:all .3s;font-size:13px;}
#toast.show{transform:translateY(0);opacity:1;}
#toast.error{border-color:var(--danger);color:var(--danger);}
#toast.success{border-color:var(--success);color:var(--success);}

/* ── Utils ── */
.divider{border:none;border-top:1px solid var(--border);margin:16px 0;}
.text-muted{color:var(--text-muted);font-size:12px;}
.text-center{text-align:center;}
.copy-btn{flex-shrink:0;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:3px 9px;cursor:pointer;font-size:10px;font-family:var(--font-body);}
.copy-btn:hover{border-color:var(--accent);color:var(--accent);}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.invite-code{font-family:monospace;font-size:22px;font-weight:700;letter-spacing:.12em;color:var(--accent);}
.school-badge{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--text-muted);}

/* ── Footer ── */
.app-footer {
  text-align: center; padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px; color: var(--text-muted);
  background: var(--surface);
  display: flex; align-items: center; justify-content: center;
  gap: 16px; flex-wrap: wrap;
}
.app-footer a {
  color: var(--text-muted); text-decoration: none;
  cursor: pointer; transition: color .2s;
}
.app-footer a:hover { color: var(--accent); }
.legal-section { margin-bottom: 22px; }
.legal-section h3 { font-family: var(--font-display); font-size: 16px; margin-bottom: 8px; color: var(--text); }
.legal-section p { font-size: 13px; line-height: 1.7; color: var(--text-muted); margin-bottom: 8px; }
.legal-section ul { padding-left: 18px; font-size: 13px; line-height: 1.8; color: var(--text-muted); }
.sa-school-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.sa-school-name{font-weight:600;font-size:15px;flex:1;}
.sa-school-meta{font-size:12px;color:var(--text-muted);margin-top:3px;}

/* ── Mobile ── */
@media(max-width:768px){
  #toast{bottom:80px;right:10px;left:10px;max-width:100%;text-align:center;}
  #auth-screen{padding:16px;align-items:flex-start;padding-top:32px;min-height:100dvh;overflow-y:auto;}
  .auth-box{width:100%;padding:24px 16px;}
  .topbar{padding:0 14px;height:50px;}
  .topbar-user{display:none;}
  .layout{flex-direction:column;}
  .sidebar{width:100%;min-height:unset;border-right:none;border-top:1px solid var(--border);padding:6px 6px env(safe-area-inset-bottom);position:fixed;bottom:0;left:0;right:0;z-index:99;display:flex;flex-direction:row;overflow-x:auto;gap:2px;}
  .nav-section{display:none;}
  .nav-item{flex-direction:column;gap:2px;padding:5px 8px;min-width:55px;font-size:9px;text-align:center;border-radius:7px;white-space:nowrap;flex:1;}
  .nav-icon{font-size:17px;width:auto;}
  .main{padding:14px 10px;padding-bottom:85px;}
  .page-title{font-size:20px;margin-bottom:14px;}
  .card{padding:14px;margin-bottom:10px;}
  .grid-2,.grid-3{grid-template-columns:1fr;}
  table,thead,tbody,th,td,tr{display:block;}
  thead{display:none;}
  td{padding:5px 10px;border-bottom:none;display:flex;align-items:center;gap:7px;}
  td:before{content:attr(data-label);font-size:10px;font-weight:600;color:var(--text-muted);text-transform:uppercase;min-width:80px;flex-shrink:0;}
  tr{background:var(--surface2);border:1px solid var(--border);border-radius:9px;margin-bottom:8px;padding:7px 0;}
  .cal-day{min-height:50px;padding:4px;}
  .cal-slot{font-size:8px;}
  .cal-day-label{font-size:9px;}
  .modal{width:100%;max-width:100%;margin:0;border-radius:18px 18px 0 0;position:fixed;bottom:0;left:0;right:0;max-height:88vh;padding:22px 18px;}
  .modal-overlay{align-items:flex-end;}
  .slot-row{gap:7px;}
  .slot-time{min-width:unset;font-size:12px;}
  .email-banner{flex-direction:column;align-items:flex-start;}
  .email-banner-input{width:100%;}
  .email-banner-input input{width:100%;}
  #booking-screen{padding:16px 10px 90px;}
  .booking-card{padding:16px 12px;}
}
@media(max-width:380px){.nav-item{min-width:46px;font-size:8px;padding:4px 5px;}.nav-icon{font-size:15px;}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">🚗 Fahrschule</div>
    <div class="auth-sub">Kalender & Buchungssystem</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">Anmelden</button>
      <button class="auth-tab" onclick="switchAuthTab('register')">Neue Fahrschule</button>
    </div>
    <div id="login-form">
      <div class="field"><label>E-Mail</label><input id="login-email" type="email" placeholder="admin@fahrschule.de"></div>
      <div class="field"><label>Passwort</label><input id="login-pw" type="password" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-full" onclick="doLogin()">Anmelden</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="field"><label>Name der Fahrschule</label><input id="reg-school" type="text" placeholder="Fahrschule Mustermann"></div>
      <div class="field"><label>Bundesland</label>
        <select id="reg-bl"><option value="">— Bitte wählen —</option></select>
      </div>      <hr class="divider">

function easterSunday(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31)-1,da=((h+l-7*m+114)%31)+1;return new Date(y,mo,da);}
function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}

const _ftCache = {};
function getFeiertage(year, bl) {
  const k=`${year}-${bl}`;
  if (_ftCache[k]) return _ftCache[k];
  const e=easterSunday(year);
  const all=[
    {d:new Date(year,0,1),n:'Neujahr'},{d:addDays(e,-2),n:'Karfreitag'},
    {d:addDays(e,1),n:'Ostermontag'},{d:new Date(year,4,1),n:'Tag der Arbeit'},
    {d:addDays(e,39),n:'Christi Himmelfahrt'},{d:addDays(e,50),n:'Pfingstmontag'},
    {d:new Date(year,9,3),n:'Tag der Deutschen Einheit'},
    {d:new Date(year,11,25),n:'1. Weihnachtstag'},{d:new Date(year,11,26),n:'2. Weihnachtstag'},
    ...({BW:[{d:new Date(year,0,6),n:'Heilige Drei Könige'},{d:addDays(e,60),n:'Fronleichnam'},{d:new Date(year,7,15),n:'Mariä Himmelfahrt'},{d:new Date(year,10,1),n:'Allerheiligen'}],
      BY:[{d:new Date(year,0,6),n:'Heilige Drei Könige'},{d:addDays(e,60),n:'Fronleichnam'},{d:new Date(year,7,15),n:'Mariä Himmelfahrt'},{d:new Date(year,10,1),n:'Allerheiligen'}],
      BE:[{d:new Date(year,4,8),n:'Tag der Befreiung'}],BB:[{d:new Date(year,9,31),n:'Reformationstag'}],
      HB:[{d:new Date(year,9,31),n:'Reformationstag'}],HH:[{d:new Date(year,9,31),n:'Reformationstag'}],
      HE:[{d:addDays(e,60),n:'Fronleichnam'}],MV:[{d:new Date(year,9,31),n:'Reformationstag'}],
      NI:[{d:new Date(year,9,31),n:'Reformationstag'}],
      NW:[{d:addDays(e,60),n:'Fronleichnam'},{d:new Date(year,10,1),n:'Allerheiligen'}],
      RP:[{d:addDays(e,60),n:'Fronleichnam'},{d:new Date(year,10,1),n:'Allerheiligen'}],
      SL:[{d:addDays(e,60),n:'Fronleichnam'},{d:new Date(year,7,15),n:'Mariä Himmelfahrt'},{d:new Date(year,10,1),n:'Allerheiligen'}],
      SN:[{d:new Date(year,9,31),n:'Reformationstag'},{d:new Date(year,10,17),n:'Buß- und Bettag'}],
      ST:[{d:new Date(year,0,6),n:'Heilige Drei Könige'},{d:new Date(year,9,31),n:'Reformationstag'}],
      SH:[{d:new Date(year,9,31),n:'Reformationstag'}],
      TH:[{d:new Date(year,9,31),n:'Reformationstag'},{d:new Date(year,8,20),n:'Weltkindertag'}],
    }[bl]||[])
  ];
  const map={};
  all.forEach(f=>{map[`${f.d.getFullYear()}-${f.d.getMonth()}-${f.d.getDate()}`]=f.n;});
  _ftCache[k]=map; return map;
}
function getFeiertageName(date, bl) {
  if (!bl) return null;
  const m=getFeiertage(date.getFullYear(),bl);
  return m[`${date.getFullYear()}-${date.getMonth()}-${date.getDate()}`]||null;
}

// ── DEFAULT FAHRSTUNDENARTEN ──
const DEFAULT_ARTEN = [
  {id:'normal',label:'Normal',color:'#4a90d9'},
  {id:'ueberlandfahrt',label:'Überlandfahrt',color:'#e07b30'},

async function loadTypes() {
  try {
    const snap = await getDoc(doc(db,'settings','fahrstundenarten'));
    fahrstundenarten = (snap.exists()&&snap.data().arten?.length) ? snap.data().arten : DEFAULT_ARTEN;
  } catch(e) { fahrstundenarten = DEFAULT_ARTEN; }
  injectTypeBadgeStyles();
}
function injectTypeBadgeStyles() {
  let old=document.getElementById('dts'); if(old)old.remove();
  const s=document.createElement('style'); s.id='dts';
  s.textContent=fahrstundenarten.map(t=>{const h=t.color,r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
    return `.slot-${t.id}{background:rgba(${r},${g},${b},0.22);color:${h};filter:brightness(1.4);}.badge-${t.id}{background:rgba(${r},${g},${b},0.18);color:${h};filter:brightness(1.4);}`;
  }).join('');
  document.head.appendChild(s);
}
function typeLabel(id){const t=fahrstundenarten.find(a=>a.id===id);return t?t.label:id;}
function typeColor(id){const t=fahrstundenarten.find(a=>a.id===id);return t?t.color:'#888';}
function typeBadgeHtml(id){const l=typeLabel(id),c=typeColor(id),r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
  return `<span class="badge" style="background:rgba(${r},${g},${b},0.18);color:${c};filter:brightness(1.4)">${l}</span>`;}

function fmtTime(ts){if(!ts)return'—';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}
function fmtDatetime(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});}

window.doRegisterAdmin=async function(){
  const schoolName=document.getElementById('reg-school').value.trim();
  const bl=document.getElementById('reg-bl').value;
  const fname=document.getElementById('reg-fname').value.trim();
  const lname=document.getElementById('reg-lname').value.trim();
  const email=document.getElementById('reg-email').value.trim();
  const pw=document.getElementById('reg-pw').value;
  if(!schoolName||!bl||!fname||!lname||!email||!pw)return toast('Bitte alle Felder ausfüllen.','error');
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pw);
    const schoolRef=await addDoc(collection(db,'schools'),{name:schoolName,bundesland:bl,adminUid:cred.user.uid,createdAt:serverTimestamp()});
    await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,email,fname,lname,role:'admin',approved:true,schoolId:schoolRef.id,createdAt:serverTimestamp()});
    toast('Fahrschule registriert!','success');
  }catch(e){toast('Fehler: '+e.message,'error');}
};

  calDate=new Date();calView='month';weekStart=null;

};

// ── AUTH STATE ──
onAuthStateChanged(auth,async user=>{
  const params=new URLSearchParams(window.location.search);
  if(params.get('schueler')&&params.get('lehrer')){showBookingPage(params.get('schueler'),params.get('lehrer'));return;}
  if(!user){show('auth');return;}
  currentUser=user;
  await loadTypes();
  const snap=await getDoc(doc(db,'users',user.uid));
  if(user.email===SUPER_ADMIN_EMAIL){
    if(!snap.exists()){
      await setDoc(doc(db,'users',user.uid),{uid:user.uid,email:user.email,fname:'Super',lname:'Admin',role:'superadmin',approved:true,createdAt:serverTimestamp()});
      currentProfile={fname:'Super',lname:'Admin',role:'superadmin'};
    }else{currentProfile=snap.data();}
    currentRole='superadmin';
  }else{
    if(!snap.exists()){toast('Kein Profil gefunden.','error');await signOut(auth);return;}
    currentProfile=snap.data();
    if(!currentProfile.approved){toast('Account noch nicht freigeschaltet.','error');await signOut(auth);return;}
    currentRole=currentProfile.role||'lehrer';
    currentSchoolId=currentProfile.schoolId||null;
    if(currentSchoolId){const ss=await getDoc(doc(db,'schools',currentSchoolId));currentSchool=ss.exists()?{id:ss.id,...ss.data()}:null;}
  }
  const roleLabels={'superadmin':'Super-Admin','admin':'Admin','lehrer':'Fahrlehrer'};
  document.getElementById('topbar-role').textContent=roleLabels[currentRole]||currentRole;
  document.getElementById('topbar-user').textContent=currentProfile.fname+' '+currentProfile.lname;
  if(currentSchool){
    document.getElementById('topbar-school').style.display='';
    document.getElementById('topbar-school-name').textContent=currentSchool.name;
  }
  show('app');buildSidebar();
  navigate(currentRole==='superadmin'?'sa-dashboard':currentRole==='admin'?'admin-dashboard':'lehrer-kalender');
});

      const s=d.data();

window.saCreateSchool=async function(){
  const name=document.getElementById('sa-school-name').value.trim();
  const bl=document.getElementById('sa-school-bl').value;
  const fname=document.getElementById('sa-admin-fname').value.trim();
  const lname=document.getElementById('sa-admin-lname').value.trim();
  const email=document.getElementById('sa-admin-email').value.trim();
  const pw=document.getElementById('sa-admin-pw').value;
  if(!name||!bl||!fname||!lname||!email||!pw)return toast('Bitte alle Felder ausfüllen.','error');
  try{
    // Speichere Super-Admin Credentials vor dem Wechsel
    const saEmail=currentUser.email;
    const cred=await createUserWithEmailAndPassword(auth,email,pw);
    const schoolRef=await addDoc(collection(db,'schools'),{name,bundesland:bl,adminUid:cred.user.uid,createdAt:serverTimestamp()});
    await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,email,fname,lname,role:'admin',approved:true,schoolId:schoolRef.id,createdAt:serverTimestamp()});
    // Zeige Passwort-Modal für Re-Login
    openModal(`<h2 class="modal-title">Super-Admin bestätigen</h2>
      <p class="text-muted" style="margin-bottom:14px">Bitte Super-Admin Passwort eingeben um fortzufahren.</p>
      <div class="field"><label>Passwort</label><input id="sa-relogin-pw" type="password" placeholder="Dein Passwort"></div>
      <button class="btn btn-primary btn-full" onclick="saReLogin('${saEmail}')">Bestätigen</button>`);
    setTimeout(()=>document.getElementById('sa-relogin-pw')?.focus(),100);
  }catch(e){toast('Fehler: '+e.message,'error');}
};
window.saReLogin=async function(saEmail){
  const pw=document.getElementById('sa-relogin-pw')?.value;
  if(!pw)return toast('Passwort eingeben.','error');
  try{
    await signInWithEmailAndPassword(auth,saEmail,pw);
    closeModal();
    toast('Fahrschule angelegt!','success');
    await renderSASchoolList();
  }catch(e){toast('Falsches Passwort.','error');}
};
window.deleteSchool=async function(schoolId,name){
  if(!confirm(`Fahrschule "${name}" wirklich löschen?\n\nALLE Daten (Lehrer, Schüler, Slots, Buchungen) werden unwiderruflich gelöscht!`))return;
  toast('Wird gelöscht…','');
  // Alle schoolId-gebundenen Daten löschen
  const collections=['users','schueler','slots','autos','blocked','globalBlocked','urlaub','notizen','warteliste','pruefungen','mailQueue'];
  for(const col of collections){
    try{
      const snap=await getDocs(query(collection(db,col),where('schoolId','==',schoolId)));
      for(const d of snap.docs)await deleteDoc(doc(db,col,d.id));
    }catch(e){ /* Collection may not have schoolId index yet */ }
  }
  // Users haben schoolId
  try{
    const uSnap=await getDocs(query(collection(db,'users'),where('schoolId','==',schoolId)));
    for(const d of uSnap.docs)await deleteDoc(doc(db,'users',d.id));
  }catch(e){}
  await deleteDoc(doc(db,'schools',schoolId));
  toast('Fahrschule gelöscht.','success');
  navigate('sa-fahrschulen');
};

async function loadSchuelerList(lehrerDocs){
  const el=document.getElementById('schueler-list');if(!el)return;
  const [snap,autosSnap]=await Promise.all([getDocs(query(collection(db,'schueler'),where('schoolId','==',currentSchoolId))),getDocs(query(collection(db,'autos'),where('schoolId','==',currentSchoolId)))]);
  if(snap.empty){el.innerHTML='<p class="text-muted">Noch keine Schüler.</p>';return;}
  const lm={};(lehrerDocs||[]).forEach(d=>{const u=d.data();lm[d.id]=u.fname+' '+u.lname;});
  const am={};autosSnap.docs.forEach(d=>{const a=d.data();am[d.id]=a;});
  el.innerHTML='<table><thead><tr><th>Name</th><th>Fahrlehrer</th><th>Kontingent</th><th>Auto</th><th>Link</th><th></th></tr></thead><tbody>'+
    snap.docs.map(d=>{
      const s=d.data();
      const link=`${location.origin}${location.pathname}?schueler=${d.id}&lehrer=${s.lehrerUid||''}`;
      const k=s.maxFahrstunden>0?`${s.bookedCount||0}/${s.maxFahrstunden}`:`${s.bookedCount||0}/∞`;
      const w=s.maxFahrstunden>0&&(s.bookedCount||0)>=s.maxFahrstunden;
      const autoStr=s.autoId&&am[s.autoId]?`<span class="auto-kennzeichen" style="font-size:10px">${am[s.autoId].kennzeichen}</span>`:'—';
      return`<tr><td>${s.fname} ${s.lname}</td><td>${s.lehrerUid?(lm[s.lehrerUid]||'?'):'—'}</td>
        <td style="color:${w?'var(--danger)':'inherit'}">${k}${w?' ⚠️':''}</td>
        <td>${autoStr}</td>
        <td>${s.lehrerUid?`<button class="copy-btn" onclick="copyLink('${link}')">🔗</button>`:'—'}</td>
        <td><button class="btn btn-secondary btn-sm" onclick="editSchueler('${d.id}')">Bearb.</button> <button class="btn btn-danger btn-sm" onclick="deleteSchueler('${d.id}')">Löschen</button></td>
      </tr>`;}).join('')+'</tbody></table>';
}

  const now=new Date();
  document.getElementById('aus-von').value=new Date(now.getFullYear(),now.getMonth(),1).toISOString().slice(0,10);
  document.getElementById('aus-bis').value=new Date(now.getFullYear(),now.getMonth()+1,0).toISOString().slice(0,10);

window.loadAuslastung=async function(){
  const von=document.getElementById('aus-von').value,bis=document.getElementById('aus-bis').value;
  if(!von||!bis)return;
  const el=document.getElementById('auslastung-content');el.innerHTML='<div class="spinner"></div>';
  const [lSnap,slotsSnap]=await Promise.all([
    getDocs(query(collection(db,'users'),where('schoolId','==',currentSchoolId),where('role','==','lehrer'),where('approved','==',true))),
    getDocs(query(collection(db,'slots'),where('schoolId','==',currentSchoolId),where('startTime','>=',Timestamp.fromDate(new Date(von+'T00:00:00'))),where('startTime','<=',Timestamp.fromDate(new Date(bis+'T23:59:59'))),orderBy('startTime'))),
  ]);
  const stats={};
  lSnap.docs.forEach(d=>{stats[d.id]={name:d.data().fname+' '+d.data().lname,total:0,booked:0,types:{}};});
  slotsSnap.docs.forEach(d=>{const s=d.data();if(!stats[s.lehrerUid])return;stats[s.lehrerUid].total++;if(s.bookedBy)stats[s.lehrerUid].booked++;stats[s.lehrerUid].types[s.type]=(stats[s.lehrerUid].types[s.type]||0)+1;});
  const totalS=Object.values(stats).reduce((a,b)=>a+b.total,0);
  const totalB=Object.values(stats).reduce((a,b)=>a+b.booked,0);
  let html=`<div class="grid-2" style="margin-bottom:16px">
    <div class="stat-card"><div class="stat-label">Slots gesamt</div><div class="stat-val">${totalS}</div></div>
    <div class="stat-card"><div class="stat-label">Gebucht</div><div class="stat-val" style="color:var(--success)">${totalB} <span style="font-size:14px">(${totalS?Math.round(totalB/totalS*100):0}%)</span></div></div>
  </div><div class="card">`;
  Object.entries(stats).sort((a,b)=>b[1].booked-a[1].booked).forEach(([uid,s])=>{
    const pct=s.total?Math.round(s.booked/s.total*100):0;
    const bc=pct>=80?'var(--success)':pct>=50?'var(--accent)':'var(--danger)';
    html+=`<div style="margin-bottom:14px"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><span style="font-weight:500">${s.name}</span><span style="font-size:12px;color:var(--text-muted)">${s.booked}/${s.total} · ${pct}%</span></div>
    <div class="auslastung-bar-bg"><div class="auslastung-bar-fill" style="width:${pct}%;background:${bc}"></div></div></div>`;
  });
  html+='</div>';
  el.innerHTML=html;
};

pages['lehrer-kalender']=function(el){
  if(!weekStart){const now=new Date();const dow=now.getDay()===0?6:now.getDay()-1;weekStart=new Date(now.getFullYear(),now.getMonth(),now.getDate()-dow);}
  el.innerHTML=`<div class="page active"><h1 class="page-title">Kalender</h1>
  <div class="card">
    <div class="cal-header">
      <button class="btn btn-secondary btn-sm" onclick="calPrev()">◀</button>
      <span class="cal-month" id="cal-month-label"></span>
      <button class="btn btn-secondary btn-sm" onclick="calNext()">▶</button>
      <div class="cal-view-toggle">
        <button class="cal-view-btn ${calView==='month'?'active':''}" onclick="setCalView('month')">Monat</button>
        <button class="cal-view-btn ${calView==='week'?'active':''}" onclick="setCalView('week')">Woche</button>
      </div>
    </div>
    <div id="cal-grid"></div>

window.setCalView=function(v){calView=v;document.querySelectorAll('.cal-view-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim()===(v==='month'?'Monat':'Woche')));renderCal();};
window.calPrev=function(){if(calView==='month')calDate.setMonth(calDate.getMonth()-1);else weekStart=new Date(weekStart.getFullYear(),weekStart.getMonth(),weekStart.getDate()-7);renderCal();};
window.calNext=function(){if(calView==='month')calDate.setMonth(calDate.getMonth()+1);else weekStart=new Date(weekStart.getFullYear(),weekStart.getMonth(),weekStart.getDate()+7);renderCal();};

async function renderCal(){
  const label=document.getElementById('cal-month-label'),grid=document.getElementById('cal-grid');
  if(!label||!grid)return;
  if(calView==='month')await renderMonthCal(label,grid);
  else await renderWeekCal(label,grid);
}

async function renderMonthCal(label,grid){
  const year=calDate.getFullYear(),month=calDate.getMonth();
  label.textContent=new Date(year,month,1).toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  const days=['Mo','Di','Mi','Do','Fr','Sa','So'];
  let html=days.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const first=new Date(year,month,1);
  let startDow=first.getDay()-1;if(startDow<0)startDow=6;
  const dim=new Date(year,month+1,0).getDate(),prevDays=new Date(year,month,0).getDate();
  const [sSnap,bSnap,gbSnap,uSnap]=await Promise.all([
    getDocs(query(collection(db,'slots'),where('lehrerUid','==',currentUser.uid))),
    getDocs(query(collection(db,'blocked'),where('lehrerUid','==',currentUser.uid))),
    getDocs(query(collection(db,'globalBlocked'),where('schoolId','==',currentSchoolId))),
    getDocs(query(collection(db,'urlaub'),where('lehrerUid','==',currentUser.uid))),
  ]);
  const slotsByDay={};
  sSnap.docs.forEach(d=>{const s=d.data();const dt=s.startTime.toDate();if(dt.getFullYear()===year&&dt.getMonth()===month){const day=dt.getDate();if(!slotsByDay[day])slotsByDay[day]=[];slotsByDay[day].push({id:d.id,...s});}});
  const blockedSet=new Set();
  bSnap.docs.forEach(d=>{const b=d.data();if(b.year===year&&b.month===month)blockedSet.add(b.day);});
  gbSnap.docs.forEach(d=>{const b=d.data();if(b.year===year&&b.month===month)blockedSet.add('g'+b.day);});
  const urlaubList=uSnap.docs.map(d=>({id:d.id,...d.data()}));
  const today=new Date();
  for(let i=0;i<startDow;i++)html+=`<div class="cal-day other-month"><div class="cal-day-num">${prevDays-startDow+i+1}</div></div>`;
  for(let d=1;d<=dim;d++){
    const thisDate=new Date(year,month,d);
    const isToday=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
    const isBlocked=blockedSet.has(d);const isGlobal=blockedSet.has('g'+d);
    const ft=getFeiertageName(thisDate,currentSchool?.bundesland);
    const urlaubEntry=urlaubCoversDate(urlaubList,thisDate);
    const slots=slotsByDay[d]||[];
    let dc='';
    if(ft)dc+=`<div class="cal-slot" style="background:rgba(212,168,67,.2);color:var(--accent2);font-size:8px">🎉 ${ft}</div>`;
    if(urlaubEntry)dc+=`<div class="cal-slot" style="background:rgba(91,186,122,.2);color:#5bba7a;font-size:8px">🏖️ ${urlaubEntry.label||'Urlaub'}</div>`;
    else if(isGlobal)dc+=`<div class="cal-slot" style="background:rgba(212,168,67,.15);color:var(--accent);font-size:8px">🏫 Gesperrt</div>`;
    else if(isBlocked)dc+=`<div class="cal-slot" style="background:rgba(224,85,85,.15);color:#e05555;font-size:9px">Gesperrt</div>`;
    else dc+=slots.slice(0,3).map(s=>s.bookedBy?`<div class="cal-slot slot-${s.type} slot-booked">${fmtTime(s.startTime)} ${typeLabel(s.type)}</div>`:`<div class="cal-slot" style="background:rgba(91,186,122,.25);color:#5bba7a;font-weight:600">${fmtTime(s.startTime)} Frei</div>`).join('');
    html+=`<div class="cal-day${isToday?' today':''}${isBlocked&&!urlaubEntry?' blocked':''}${urlaubEntry?' urlaub-day':''}${ft&&!urlaubEntry?' feiertag-day':''}" onclick="openDayModal(${year},${month},${d})" style="display:flex;flex-direction:column">
      <div class="cal-day-num">${d}</div>${dc}
      ${slots.length>3?`<div style="font-size:8px;color:var(--text-muted)">+${slots.length-3}</div>`:''}
    </div>`;
  }
  const total=startDow+dim;const rem=total%7===0?0:7-(total%7);
  for(let i=1;i<=rem;i++)html+=`<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  grid.style.cssText='display:grid;grid-template-columns:repeat(7,1fr);gap:5px';
  grid.innerHTML=html;
}

async function renderWeekCal(label,grid){
  const weekDays=[];for(let i=0;i<7;i++)weekDays.push(new Date(weekStart.getFullYear(),weekStart.getMonth(),weekStart.getDate()+i));
  label.textContent=`${weekDays[0].toLocaleDateString('de-DE',{day:'2-digit',month:'short'})} – ${weekDays[6].toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'})}`;
  const startTs=Timestamp.fromDate(weekDays[0]),endTs=Timestamp.fromDate(new Date(weekDays[6].getFullYear(),weekDays[6].getMonth(),weekDays[6].getDate()+1));
  const [sSnap,bSnap,scSnap]=await Promise.all([
    getDocs(query(collection(db,'slots'),where('lehrerUid','==',currentUser.uid),where('startTime','>=',startTs),where('startTime','<',endTs),orderBy('startTime'))),
    getDocs(query(collection(db,'blocked'),where('lehrerUid','==',currentUser.uid))),
    getDocs(query(collection(db,'schueler'),where('lehrerUid','==',currentUser.uid))),
  ]);
  const scm={};scSnap.docs.forEach(d=>{const s=d.data();scm[d.id]=s.fname+' '+s.lname;});
  const bSet=new Set();bSnap.docs.forEach(d=>{const b=d.data();bSet.add(`${b.year}-${b.month}-${b.day}`);});
  const slotsByDay={};sSnap.docs.forEach(d=>{const s=d.data();const dt=s.startTime.toDate();const k=dt.toDateString();if(!slotsByDay[k])slotsByDay[k]=[];slotsByDay[k].push({id:d.id,...s,_dt:dt});});
  const today=new Date();const HOURS=Array.from({length:14},(_,i)=>i+7);const dn=['Mo','Di','Mi','Do','Fr','Sa','So'];
  let html=`<div style="display:grid;grid-template-columns:48px repeat(7,1fr);border:1px solid var(--border);border-radius:9px;overflow:hidden">`;
  html+=`<div class="week-col-header" style="background:var(--surface2);border-bottom:1px solid var(--border)"></div>`;
  weekDays.forEach((d,i)=>{const isT=d.toDateString()===today.toDateString();html+=`<div class="week-col-header${isT?' today-col':''}" style="background:var(--surface2);border-bottom:1px solid var(--border);border-left:1px solid var(--border)"><div style="font-weight:700">${dn[i]}</div><div style="font-size:10px;color:${isT?'var(--accent)':'var(--text-muted)'}">${d.getDate()}.${d.getMonth()+1}.</div></div>`;});
  HOURS.forEach(hour=>{
    html+=`<div class="week-time-label">${hour}:00</div>`;
    weekDays.forEach(day=>{
      const dk=day.toDateString();const blocked=bSet.has(`${day.getFullYear()}-${day.getMonth()}-${day.getDate()}`);
      const daySlots=(slotsByDay[dk]||[]).filter(s=>s._dt.getHours()===hour);
      let cc='';daySlots.forEach(s=>{const c=typeColor(s.type);const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
        const endH=s.endTime.toDate().getHours(),endM=s.endTime.toDate().getMinutes(),startM=s._dt.getMinutes();
        const hp=Math.max(20,Math.round(((endH*60+endM)-(hour*60+startM))/60*44));
        const name=s.bookedBy?(scm[s.bookedBy]||'?'):'Frei';
        cc+=`<div class="week-slot-chip" style="background:rgba(${r},${g},${b},0.25);color:${c};filter:brightness(1.4);height:${hp}px;top:${Math.round(startM/60*44)}px" onclick="event.stopPropagation();openDayModal(${day.getFullYear()},${day.getMonth()},${day.getDate()})">${fmtTime(s.startTime)} ${name}</div>`;});
      html+=`<div class="week-cell${blocked?' blocked-cell':''}" style="border-left:1px solid rgba(46,46,46,.3)" onclick="openDayModal(${day.getFullYear()},${day.getMonth()},${day.getDate()})">${cc}</div>`;
    });
  });
  html+=`</div>`;
  grid.style.cssText='display:block';grid.innerHTML=html;
}

window.openDayModal=async function(year,month,day){
  const date=new Date(year,month,day);
  const dateStr=date.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const ft=getFeiertageName(date,currentSchool?.bundesland);
  const [sSnap,bSnap,gbSnap,profSnap,uSnap]=await Promise.all([
    getDocs(query(collection(db,'slots'),where('lehrerUid','==',currentUser.uid))),
    getDocs(query(collection(db,'blocked'),where('lehrerUid','==',currentUser.uid),where('year','==',year),where('month','==',month),where('day','==',day))),
    getDocs(query(collection(db,'globalBlocked'),where('schoolId','==',currentSchoolId),where('year','==',year),where('month','==',month),where('day','==',day))),
    getDoc(doc(db,'users',currentUser.uid)),
    getDocs(query(collection(db,'urlaub'),where('lehrerUid','==',currentUser.uid))),
  ]);
  const blockDauer=profSnap.exists()?(profSnap.data().blockDauer||60):60;
  const urlaubEntry=urlaubCoversDate(uSnap.docs.map(d=>({id:d.id,...d.data()})),date);
  const daySlots=sSnap.docs.filter(d=>{const dt=d.data().startTime.toDate();return dt.getFullYear()===year&&dt.getMonth()===month&&dt.getDate()===day;});
  const isBlocked=!bSnap.empty,isGlobal=!gbSnap.empty;
  const blockedId=isBlocked?bSnap.docs[0].id:null;
  const scSnap=await getDocs(query(collection(db,'schueler'),where('lehrerUid','==',currentUser.uid)));
  const scm={};scSnap.docs.forEach(d=>{const s=d.data();scm[d.id]=s.fname+' '+s.lname;});
  const slotsHtml=daySlots.length?daySlots.map(d=>{const s=d.data();const sn=s.bookedBy?(scm[s.bookedBy]||'?'):null;

  openModal(`<h2 class="modal-title">${dateStr}</h2>
    ${ft?`<div style="background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);border-radius:7px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--accent)">🎉 Feiertag: ${ft}</div>`:''}

    ${isGlobal?`<div style="background:rgba(212,168,67,.1);border:1px solid var(--accent);border-radius:7px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--accent)">🏫 Globaler Sperrtag</div>`:''}
    <div style="margin-bottom:12px">
      ${isBlocked?`<button class="btn btn-secondary btn-sm" onclick="unblockDay('${blockedId}',${year},${month},${day})">🔓 Entsperren</button>`:
      `<button class="btn btn-danger btn-sm" onclick="blockDay(${year},${month},${day})">🔒 Tag sperren</button>`}
    </div>
    <hr class="divider">

    <button class="btn btn-primary" onclick="addSlot(${year},${month},${day})">Slot hinzufügen</button>`);
  setTimeout(()=>updateEndTime(blockDauer),50);

window.updateEndTime=function(bd){const f=document.getElementById('ns-from'),t=document.getElementById('ns-to');if(!f||!t||!f.value)return;const[h,m]=f.value.split(':').map(Number);const tot=h*60+m+bd;t.value=`${String(Math.floor(tot/60)%24).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;};
window.addSlot=async function(year,month,day){
  const from=document.getElementById('ns-from').value,type=document.getElementById('ns-type').value;
  if(!from)return toast('Bitte Startzeit angeben.','error');
  const pSnap=await getDoc(doc(db,'users',currentUser.uid));
  const bd=pSnap.exists()?(pSnap.data().blockDauer||60):60;
  const[fh,fm]=from.split(':').map(Number);const tot=fh*60+fm+bd;
  const st=Timestamp.fromDate(new Date(year,month,day,fh,fm));
  const et=Timestamp.fromDate(new Date(year,month,day,Math.floor(tot/60)%24,tot%60));
  await addDoc(collection(db,'slots'),{lehrerUid:currentUser.uid,type,startTime:st,endTime:et,bookedBy:null,schoolId:currentSchoolId,createdAt:serverTimestamp()});
  toast('Slot hinzugefügt!','success');closeModal();renderCal();
};

async function renderAdminCal(){
  const label=document.getElementById('admin-cal-label'),grid=document.getElementById('admin-cal-grid');if(!label||!grid)return;
  const year=window._adminCalDate.getFullYear(),month=window._adminCalDate.getMonth(),lehrerUid=window._adminCalLehrerUid;
  label.textContent=new Date(year,month,1).toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  const days=['Mo','Di','Mi','Do','Fr','Sa','So'];
  let html=days.map(d=>`<div class="cal-day-label">${d}</div>`).join('');
  const first=new Date(year,month,1);let startDow=first.getDay()-1;if(startDow<0)startDow=6;
  const dim=new Date(year,month+1,0).getDate(),prevDays=new Date(year,month,0).getDate();
  const[sSnap,bSnap,scSnap]=await Promise.all([getDocs(query(collection(db,'slots'),where('lehrerUid','==',lehrerUid))),getDocs(query(collection(db,'blocked'),where('lehrerUid','==',lehrerUid))),getDocs(query(collection(db,'schueler'),where('lehrerUid','==',lehrerUid)))]);
  const scm={};scSnap.docs.forEach(d=>{const s=d.data();scm[d.id]=s.fname+' '+s.lname;});
  const slotsByDay={};sSnap.docs.forEach(d=>{const s=d.data();const dt=s.startTime.toDate();if(dt.getFullYear()===year&&dt.getMonth()===month){const day=dt.getDate();if(!slotsByDay[day])slotsByDay[day]=[];slotsByDay[day].push({id:d.id,...s});}});
  const bSet=new Set();bSnap.docs.forEach(d=>{const b=d.data();if(b.year===year&&b.month===month)bSet.add(b.day);});
  const today=new Date();
  for(let i=0;i<startDow;i++)html+=`<div class="cal-day other-month"><div class="cal-day-num">${prevDays-startDow+i+1}</div></div>`;
  for(let d=1;d<=dim;d++){
    const isT=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
    const isB=bSet.has(d);const slots=slotsByDay[d]||[];
    const slotHtml=slots.slice(0,2).map(s=>{const sn=s.bookedBy?(scm[s.bookedBy]||'?'):'';return s.bookedBy?`<div class="cal-slot slot-${s.type} slot-booked" title="${sn}">${fmtTime(s.startTime)} ${sn}</div>`:`<div class="cal-slot" style="background:rgba(91,186,122,.25);color:#5bba7a">${fmtTime(s.startTime)} Frei</div>`;}).join('');
    html+=`<div class="cal-day${isT?' today':''}${isB?' blocked':''}" onclick="adminOpenDayDetail(${year},${month},${d})" style="display:flex;flex-direction:column">
      <div class="cal-day-num">${d}</div>${isB?'<div class="cal-slot" style="background:rgba(224,85,85,.15);color:#e05555;font-size:8px">Gesperrt</div>':slotHtml}
      ${slots.length>2?`<div style="font-size:8px;color:var(--text-muted)">+${slots.length-2}</div>`:''}
    </div>`;
  }
  const total=startDow+dim,rem=total%7===0?0:7-(total%7);
  for(let i=1;i<=rem;i++)html+=`<div class="cal-day other-month"><div class="cal-day-num">${i}</div></div>`;
  grid.innerHTML=html;
}
window.adminOpenDayDetail=async function(year,month,day){
  const lUid=window._adminCalLehrerUid;
  const date=new Date(year,month,day);const dateStr=date.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
  const[sSnap,scSnap]=await Promise.all([getDocs(query(collection(db,'slots'),where('lehrerUid','==',lUid))),getDocs(query(collection(db,'schueler'),where('lehrerUid','==',lUid)))]);
  const scm={};scSnap.docs.forEach(d=>{const s=d.data();scm[d.id]=s.fname+' '+s.lname;});
  const daySlots=sSnap.docs.filter(d=>{const dt=d.data().startTime.toDate();return dt.getFullYear()===year&&dt.getMonth()===month&&dt.getDate()===day;});
  const sHtml=daySlots.length?daySlots.map(d=>{const s=d.data();const sn=s.bookedBy?(scm[s.bookedBy]||'?'):null;
    return`<div class="slot-row"><div class="slot-time">${fmtTime(s.startTime)}–${fmtTime(s.endTime)}</div>
    <div class="slot-info">${typeBadgeHtml(s.type)}${sn?`<div class="slot-student">👤 ${sn}</div>`:'<div class="slot-student" style="color:var(--success)">Frei</div>'}</div></div>`;}).join(''):'<p class="text-muted">Keine Slots.</p>';
  openModal(`<h2 class="modal-title">${dateStr}</h2><div class="card-title">Slots – ${window._adminCalLehrerName}</div>${sHtml}`);
};

function pruefungStatusBadge(status){const map={bestanden:'Bestanden',nicht_bestanden:'Nicht bestanden',ausstehend:'Ausstehend'};const cls=status==='nicht_bestanden'?'nicht-bestanden':status;return`<span class="badge badge-${cls}">${map[status]||status}</span>`;}
function pruefungStatusDot(s){return{bestanden:'#5bba7a',nicht_bestanden:'#e05555',ausstehend:'#d4a843'}[s]||'#888';}
async function loadPruefungenForSchueler(sid){const snap=await getDocs(query(collection(db,'pruefungen'),where('schuelerId','==',sid),orderBy('datum','desc')));return snap.docs.map(d=>({id:d.id,...d.data()}));}
function renderPruefungenList(list,canEdit,sid){
  if(!list.length)return'<p class="text-muted">Noch keine Prüfungen.</p>';
  return list.map(p=>{const ds=p.datum?new Date(p.datum+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit',month:'long',year:'numeric'}):'—';
    return`<div class="pruefung-card"><div class="pruefung-status" style="background:${pruefungStatusDot(p.status)}"></div>
    <div class="pruefung-info"><div class="pruefung-title">Versuch ${p.versuch||1}</div><div class="pruefung-meta">📅 ${ds}${p.ort?' · 📍'+p.ort:''}${p.notiz?' · '+p.notiz:''}</div></div>
    ${pruefungStatusBadge(p.status)}
    ${canEdit?`<button class="btn btn-secondary btn-sm" onclick="editPruefung('${p.id}','${sid}')">Bearb.</button><button class="btn btn-danger btn-sm" onclick="deletePruefung('${p.id}','${sid}')">×</button>`:''}
    </div>`;}).join('');}
function pruefungFormHtml(sid,p=null){
  const isEdit=!!p;
  const opts=[{v:'ausstehend',l:'Ausstehend'},{v:'bestanden',l:'Bestanden'},{v:'nicht_bestanden',l:'Nicht bestanden'}].map(o=>`<option value="${o.v}" ${(p?.status||'ausstehend')===o.v?'selected':''}>${o.l}</option>`).join('');
  return`<h2 class="modal-title">${isEdit?'Prüfung bearbeiten':'Prüfung eintragen'}</h2>
    <div class="grid-2"><div class="field"><label>Datum</label><input id="pf-d" type="date" value="${p?.datum||''}"></div><div class="field"><label>Versuch</label><input id="pf-v" type="number" min="1" value="${p?.versuch||1}"></div></div>

    <div class="field"><label>Status</label><select id="pf-s">${opts}</select></div>
    <div class="field"><label>Notiz</label><input id="pf-n" placeholder="Rückwärtsfahren…" value="${escHtml(p?.notiz||'')}"></div>
    <button class="btn btn-primary" onclick="${isEdit?`savePruefungEdit('${p.id}','${sid}')`:`savePruefungNew('${sid}')`}">${isEdit?'Speichern':'Eintragen'}</button>`;}

let _apCache=[];
async function loadAdminPruefungen(){
  const[scSnap,pSnap,lSnap]=await Promise.all([getDocs(query(collection(db,'schueler'),where('schoolId','==',currentSchoolId))),getDocs(query(collection(db,'pruefungen'),where('schoolId','==',currentSchoolId),orderBy('datum','desc'))),getDocs(query(collection(db,'users'),where('schoolId','==',currentSchoolId),where('role','==','lehrer')))]);
  const lm={};lSnap.docs.forEach(d=>{const u=d.data();lm[d.id]=u.fname+' '+u.lname;});
  const pbS={};pSnap.docs.forEach(d=>{const p={id:d.id,...d.data()};if(!pbS[p.schuelerId])pbS[p.schuelerId]=[];pbS[p.schuelerId].push(p);});
  _apCache=scSnap.docs.map(d=>({id:d.id,...d.data(),pruefungen:pbS[d.id]||[]}));
  const bestanden=_apCache.filter(s=>s.pruefungen.some(p=>p.status==='bestanden')).length;
  const stats=document.getElementById('ap-stats');
  if(stats)stats.innerHTML=[{l:'Gesamt',v:_apCache.length,c:'var(--text)'},{l:'Bestanden',v:bestanden,c:'var(--success)'},{l:'Ausstehend',v:_apCache.length-bestanden,c:'var(--accent)'}].map(s=>`<div class="stat-card" style="min-width:100px"><div class="stat-label">${s.l}</div><div class="stat-val" style="color:${s.c}">${s.v}</div></div>`).join('');
  renderAdminPruefungenList(lm);
}
function renderAdminPruefungenList(lm){
  const filter=document.getElementById('ap-filter')?.value||'',el=document.getElementById('ap-list');if(!el)return;
  let list=_apCache;
  if(filter==='bestanden')list=list.filter(s=>s.pruefungen.some(p=>p.status==='bestanden'));
  else if(filter==='nicht_bestanden')list=list.filter(s=>s.pruefungen.some(p=>p.status==='nicht_bestanden'));
  else if(filter==='ausstehend')list=list.filter(s=>!s.pruefungen.some(p=>p.status==='bestanden'));
  if(!list.length){el.innerHTML='<p class="text-muted">Keine Einträge.</p>';return;}
  el.innerHTML=list.map(s=>{const ls=s.pruefungen.length?s.pruefungen[0].status:null;return`<div class="pruefung-card">
    <div class="pruefung-status" style="background:${ls?pruefungStatusDot(ls):'#444'}"></div>
    <div class="pruefung-info"><div class="pruefung-title">${s.fname} ${s.lname}</div><div class="pruefung-meta">${s.lehrerUid?(lm?.[s.lehrerUid]||'?'):'—'} · ${s.pruefungen.length} Versuch(e)</div></div>
    ${ls?pruefungStatusBadge(ls):'<span class="badge badge-ausstehend">Keine</span>'}
    <button class="btn btn-primary btn-sm" onclick="openAddPruefung('${s.id}')">+ Eintragen</button>
    <button class="btn btn-secondary btn-sm" onclick="togglePruefungDetail('${s.id}')">Details</button>
  </div><div id="pd-${s.id}" style="display:none;padding:0 0 8px 22px">${renderPruefungenList(s.pruefungen,true,s.id)}</div>`;}).join('');
}

async function showBookingPage(schuelerId,lehrerUid){
  show('booking');
  await loadTypes();
  const[scSnap,lSnap]=await Promise.all([getDoc(doc(db,'schueler',schuelerId)),getDoc(doc(db,'users',lehrerUid))]);
  if(!scSnap.exists()||!lSnap.exists()){document.getElementById('booking-content').innerHTML='<div class="booking-card"><p class="text-muted text-center">Ungültiger Link.</p></div>';return;}
  const schueler=scSnap.data();if(schueler.lehrerUid!==lehrerUid){document.getElementById('booking-content').innerHTML='<div class="booking-card"><p class="text-muted text-center">Dieser Link ist nicht gültig.</p></div>';return;}
  const lehrer=lSnap.data();
  document.getElementById('booking-subtitle').textContent=`Hallo ${schueler.fname}! Dein Fahrlehrer: ${lehrer.fname} ${lehrer.lname}`;
  const schoolId=schueler.schoolId;
  const now=new Date();
  const[freeSlotsSnap,myBookingsSnap,bSnap,gbSnap,uSnap]=await Promise.all([
    getDocs(query(collection(db,'slots'),where('lehrerUid','==',lehrerUid),where('bookedBy','==',null),orderBy('startTime'))),
    getDocs(query(collection(db,'slots'),where('lehrerUid','==',lehrerUid),where('bookedBy','==',schuelerId),orderBy('startTime'))),
    getDocs(query(collection(db,'blocked'),where('lehrerUid','==',lehrerUid))),
    getDocs(query(collection(db,'globalBlocked'),where('schoolId','==',schoolId))),
    getDocs(query(collection(db,'urlaub'),where('lehrerUid','==',lehrerUid))),
  ]);
  const blockedSet=new Set(bSnap.docs.map(d=>{const b=d.data();return`${b.year}-${b.month}-${b.day}`;}));
  gbSnap.docs.forEach(d=>{const b=d.data();blockedSet.add(`${b.year}-${b.month}-${b.day}`);});
  const urlaubList=uSnap.docs.map(d=>({id:d.id,...d.data()}));
  const schoolSnap=await getDoc(doc(db,'schools',schoolId));const school=schoolSnap.exists()?schoolSnap.data():null;
  const freeSlots=freeSlotsSnap.docs.filter(d=>{const s=d.data();const dt=s.startTime.toDate();const key=`${dt.getFullYear()}-${dt.getMonth()}-${dt.getDate()}`;
    const ft=getFeiertageName(dt,school?.bundesland);const u=urlaubCoversDate(urlaubList,dt);
    return dt>now&&!blockedSet.has(key)&&!ft&&!u;});
  const myBookings=myBookingsSnap.docs.map(d=>({id:d.id,...d.data()}));
  const CANCEL_HOURS=48;const maxFS=schueler.maxFahrstunden||0;const bookedCount=myBookings.length;const limitReached=maxFS>0&&bookedCount>=maxFS;
  const maxAktiv=schueler.maxAktiveTermine||0;const aktive=myBookings.filter(s=>s.startTime.toDate()>now);const aktivLimitReached=maxAktiv>0&&aktive.length>=maxAktiv;
  let autoHtml='';
  if(schueler.autoId){const aSnap=await getDoc(doc(db,'autos',schueler.autoId));if(aSnap.exists()){const a=aSnap.data();autoHtml=`<div class="booking-card" style="padding:14px 20px"><div style="display:flex;align-items:center;gap:12px"><span style="font-size:24px">🚗</span><div><div style="font-weight:600;font-size:13px">${a.modell}</div><div style="font-size:11px;color:var(--text-muted)">${a.farbe?a.farbe+' · ':''} ${a.notiz||''}</div></div><span class="auto-kennzeichen" style="margin-left:auto">${a.kennzeichen}</span></div></div>`;}}
  let kontingentHtml='';
  if(maxFS>0){const pct=Math.min(100,Math.round(bookedCount/maxFS*100));const bc=pct>=100?'var(--danger)':pct>=75?'var(--accent)':'var(--success)';
    kontingentHtml=`<div class="booking-card" style="padding:16px 20px"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-weight:600;font-size:13px">Fahrstunden-Kontingent</span><span style="font-size:13px;font-weight:600;color:${bc}">${bookedCount}/${maxFS}</span></div>
    <div style="background:var(--surface2);border-radius:20px;height:7px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${bc};border-radius:20px"></div></div>
    ${limitReached?`<p style="margin-top:8px;font-size:12px;color:var(--danger)">⚠️ Kontingent aufgebraucht.</p>`:`<p style="margin-top:6px;font-size:11px;color:var(--text-muted)">${maxFS-bookedCount} Stunde(n) noch buchbar</p>`}</div>`;}
  const myBookingsHtml=myBookings.length?myBookings.map(s=>{const dt=s.startTime.toDate();const canCancel=(dt-now)>CANCEL_HOURS*3600000;const isPast=dt<now;
    return`<div class="slot-row" style="${isPast?'opacity:.5':''}"><div class="slot-time">${fmt(s.startTime)}<br><span style="font-size:11px;font-weight:400">${fmtTime(s.startTime)}–${fmtTime(s.endTime)}</span></div>
    <div class="slot-info">${typeBadgeHtml(s.type)}${isPast?'<div style="font-size:10px;color:var(--text-muted)">Vergangen</div>':''}</div>
    ${isPast?'':canCancel?`<button class="btn btn-danger btn-sm" onclick="cancelMyBooking('${s.id}','${schuelerId}','${lehrerUid}')">Stornieren</button>`:'<span style="font-size:11px;color:var(--text-muted)">Nicht mehr stornierbar</span>'}</div>`;}).join(''):'<p class="text-muted">Noch keine Buchungen.</p>';
  const freeSlotsHtml=limitReached?`<div style="text-align:center;padding:20px;color:var(--danger)">⛔ Kontingent erschöpft.</div>`:freeSlots.length?freeSlots.map(d=>{const s=d.data();const btn=aktivLimitReached?`<button class="btn btn-secondary btn-sm" onclick="openTauschModal('${d.id}','${schuelerId}','${lehrerUid}')">📅 Tauschen</button>`:`<button class="btn btn-primary btn-sm" onclick="bookSlot('${d.id}','${schuelerId}','${lehrerUid}')">Buchen</button>`;
    return`<div class="slot-row"><div class="slot-time">${fmt(s.startTime)}<br><span style="font-size:11px;font-weight:400">${fmtTime(s.startTime)}–${fmtTime(s.endTime)}</span></div><div class="slot-info">${typeBadgeHtml(s.type)}</div>${btn}</div>`;}).join(''):'<p class="text-muted">Aktuell keine freien Termine.</p>';
  const notizenHtml=await loadNotizenHtml(schuelerId,'schueler');
  const wlSnap=await getDocs(query(collection(db,'warteliste'),where('schuelerId','==',schuelerId),where('lehrerUid','==',lehrerUid),where('abgearbeitet','==',false)));

window.saveSchuelerEmail=async function(sid,luid){const e=document.getElementById('schueler-email-input')?.value.trim();if(!e||!e.includes('@'))return toast('Gültige E-Mail eingeben.','error');await updateDoc(doc(db,'schueler',sid),{email:e});toast('E-Mail gespeichert!','success');showBookingPage(sid,luid);};
window.changeEmail=async function(sid,luid){const snap=await getDoc(doc(db,'schueler',sid));const cur=snap.data().email||'';openModal(`<h2 class="modal-title">E-Mail ändern</h2><div class="field"><label>Neue E-Mail</label><input id="change-email-input" type="email" value="${escHtml(cur)}"></div><button class="btn btn-primary" onclick="confirmChangeEmail('${sid}','${luid}')">Speichern</button>`);};
window.confirmChangeEmail=async function(sid,luid){const e=document.getElementById('change-email-input')?.value.trim();if(!e||!e.includes('@'))return toast('Gültige E-Mail.','error');await updateDoc(doc(db,'schueler',sid),{email:e});toast('Aktualisiert!','success');closeModal();showBookingPage(sid,luid);};
window.addNotizSchueler=async function(sid,luid){const text=document.getElementById('booking-notiz-text')?.value.trim();if(!text)return toast('Nachricht eingeben.','error');const scSnap=await getDoc(doc(db,'schueler',sid));await addDoc(collection(db,'notizen'),{schuelerId:sid,lehrerUid:luid,von:'schueler',text,schoolId:scSnap.data().schoolId,createdAt:serverTimestamp()});document.getElementById('booking-notiz-text').value='';const c=document.getElementById('notizen-container-'+sid);if(c)c.innerHTML=await loadNotizenHtml(sid,'schueler');toast('Gesendet!','success');};
window.bookSlot=async function(slotId,schuelerId,lehrerUid){
  const[scSnap,slSnap,lSnap]=await Promise.all([getDoc(doc(db,'schueler',schuelerId)),getDoc(doc(db,'slots',slotId)),getDoc(doc(db,'users',lehrerUid))]);
  const s=scSnap.data(),slot=slSnap.data(),lehrer=lSnap.data();
  if((s.maxFahrstunden||0)>0&&(s.bookedCount||0)>=(s.maxFahrstunden||0))return toast('Kontingent erschöpft.','error');
  const maxA=s.maxAktiveTermine||0;
  if(maxA>0){const now=new Date();const aSnap=await getDocs(query(collection(db,'slots'),where('lehrerUid','==',lehrerUid),where('bookedBy','==',schuelerId),orderBy('startTime')));const aktive=aSnap.docs.filter(d=>d.data().startTime.toDate()>now);if(aktive.length>=maxA)return openTauschModal(slotId,schuelerId,lehrerUid);}
  await updateDoc(doc(db,'slots',slotId),{bookedBy:schuelerId,bookedAt:serverTimestamp()});
  await updateDoc(doc(db,'schueler',schuelerId),{bookedCount:(s.bookedCount||0)+1});
  if(s.email)await triggerEmail('buchungsbestaetigung',{to:s.email,schuelerName:s.fname+' '+s.lname,lehrerName:lehrer.fname+' '+lehrer.lname,datum:slot.startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}),von:fmtTime(slot.startTime),bis:fmtTime(slot.endTime),typ:typeLabel(slot.type),slotId,schuelerId,lehrerUid});
  toast('Termin gebucht!','success');showBookingPage(schuelerId,lehrerUid);
};
window.cancelMyBooking=async function(slotId,schuelerId,lehrerUid){
  const[slSnap,scSnap,lSnap]=await Promise.all([getDoc(doc(db,'slots',slotId)),getDoc(doc(db,'schueler',schuelerId)),getDoc(doc(db,'users',lehrerUid))]);
  const slot=slSnap.data(),s=scSnap.data(),lehrer=lSnap.data();
  await updateDoc(doc(db,'slots',slotId),{bookedBy:null,bookedAt:null});
  await updateDoc(doc(db,'schueler',schuelerId),{bookedCount:Math.max(0,(s.bookedCount||1)-1)});
  await triggerEmail('stornierung_freigeworden',{datum:slot.startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}),von:fmtTime(slot.startTime),bis:fmtTime(slot.endTime),typ:typeLabel(slot.type),lehrerName:lehrer.fname+' '+lehrer.lname,lehrerUid,slotId});
  await triggerEmail('warteliste_frei',{lehrerUid,slotId});
  toast('Storniert.','success');showBookingPage(schuelerId,lehrerUid);
};
window.joinWarteliste=async function(sid,luid){const notiz=document.getElementById('wl-notiz')?.value.trim()||'';const scSnap=await getDoc(doc(db,'schueler',sid));await addDoc(collection(db,'warteliste'),{schuelerId:sid,lehrerUid:luid,notiz,abgearbeitet:false,schoolId:scSnap.data().schoolId,createdAt:serverTimestamp()});toast('Eingetragen!','success');showBookingPage(sid,luid);};
window.leaveWarteliste=async function(wlId,sid,luid){await updateDoc(doc(db,'warteliste',wlId),{abgearbeitet:true});toast('Ausgetragen.','success');showBookingPage(sid,luid);};
window.openTauschModal=async function(newSlotId,schuelerId,lehrerUid){
  const[nSnap,bkSnap]=await Promise.all([getDoc(doc(db,'slots',newSlotId)),getDocs(query(collection(db,'slots'),where('lehrerUid','==',lehrerUid),where('bookedBy','==',schuelerId),orderBy('startTime')))]);
  const ns=nSnap.data();const now=new Date();const aktive=bkSnap.docs.filter(d=>d.data().startTime.toDate()>now).map(d=>({id:d.id,...d.data()}));
  const nDatum=ns.startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});
  const rows=aktive.map(b=>{const canC=(b.startTime.toDate()-now)>48*3600000;const datum=b.startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});
    return`<div class="slot-row"><div class="slot-info">${typeBadgeHtml(b.type)}<div style="font-size:12px;margin-top:3px">${datum}, ${fmtTime(b.startTime)}–${fmtTime(b.endTime)}</div></div>${canC?`<button class="btn btn-primary btn-sm" onclick="doTausch('${b.id}','${newSlotId}','${schuelerId}','${lehrerUid}')">Tauschen</button>`:'<span style="font-size:11px;color:var(--text-muted)">Nicht stornierbar</span>'}</div>`;}).join('');
  openModal(`<h2 class="modal-title">Maximum erreicht</h2><div style="background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);border-radius:7px;padding:11px;margin-bottom:14px"><div style="font-size:12px;color:var(--text-muted);margin-bottom:5px">Neuer Termin:</div><div style="font-weight:600">${nDatum}, ${fmtTime(ns.startTime)}–${fmtTime(ns.endTime)}</div>${typeBadgeHtml(ns.type)}</div><p style="font-size:13px;margin-bottom:12px">Wähle einen bestehenden Termin zum Tauschen:</p>${rows||'<p class="text-muted">Keine tauschbaren Termine.</p>'}`);
};
window.doTausch=async function(oldId,newId,sid,luid){
  const[oSnap,scSnap,lSnap,nSnap]=await Promise.all([getDoc(doc(db,'slots',oldId)),getDoc(doc(db,'schueler',sid)),getDoc(doc(db,'users',luid)),getDoc(doc(db,'slots',newId))]);
  const s=scSnap.data(),lehrer=lSnap.data(),ns=nSnap.data();
  await updateDoc(doc(db,'slots',oldId),{bookedBy:null,bookedAt:null});
  await updateDoc(doc(db,'slots',newId),{bookedBy:sid,bookedAt:serverTimestamp()});
  if(s.email)await triggerEmail('buchungsbestaetigung',{to:s.email,schuelerName:s.fname+' '+s.lname,lehrerName:lehrer.fname+' '+lehrer.lname,datum:ns.startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}),von:fmtTime(ns.startTime),bis:fmtTime(ns.endTime),typ:typeLabel(ns.type),slotId:newId,schuelerId:sid,lehrerUid:luid});
  toast('Getauscht!','success');closeModal();showBookingPage(sid,luid);
};

// Mobile table labels
function injectTableLabels(){document.querySelectorAll('table').forEach(table=>{const headers=[...table.querySelectorAll('th')].map(th=>th.textContent.trim());table.querySelectorAll('tbody tr').forEach(row=>{[...row.querySelectorAll('td')].forEach((td,i)=>{if(headers[i])td.setAttribute('data-label',headers[i]);});});});}
const _navBase=window.navigate;window.navigate=function(page){_navBase(page);setTimeout(injectTableLabels,300);};
