window.openTauschModal = async function(newSlotId, schuelerId, lehrerUid) {
  const [newSlotSnap, myBookingsSnap] = await Promise.all([
    getDoc(doc(db,'slots',newSlotId)),
    getDocs(query(collection(db,'slots'),
      where('lehrerUid','==',lehrerUid),
      where('bookedBy','==',schuelerId),
      orderBy('startTime')
    ))
  ]);

  const newSlot = newSlotSnap.data();
  const now = new Date();
  const aktiveBookings = myBookingsSnap.docs
    .filter(d => d.data().startTime.toDate() > now)
    .map(d => ({id:d.id,...d.data()}));

  const newDatum = newSlot.startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});
  const newZeit = `${fmtTime(newSlot.startTime)} – ${fmtTime(newSlot.endTime)}`;

  const tauschRows = aktiveBookings.map(b => {
    const canCancel = (b.startTime.toDate() - now) > 48 * 3600 * 1000;
    const datum = b.startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});
    const zeit = `${fmtTime(b.startTime)} – ${fmtTime(b.endTime)}`;
    return `<div class="slot-row" style="margin-bottom:8px">
      <div class="slot-info" style="flex:1">
        ${typeBadgeHtml(b.type)}
        <div style="font-size:13px;margin-top:4px">${datum}, ${zeit}</div>
      </div>
      ${canCancel
        ? `<button class="btn btn-primary btn-sm" onclick="doTausch('${b.id}','${newSlotId}','${schuelerId}','${lehrerUid}')">
            Gegen diesen tauschen
           </button>`
        : `<span class="text-muted" style="font-size:11px">Stornierung nicht mehr möglich</span>`}
    </div>`;
  }).join('');

  openModal(`
    <h2 class="modal-title">Maximum an Terminen erreicht</h2>
    <div style="background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.3);border-radius:8px;padding:14px;margin-bottom:20px">
      <div style="font-size:13px;color:var(--text-muted);margin-bottom:6px">Neuer Termin den du buchen möchtest:</div>
      <div style="font-weight:600">${newDatum}, ${newZeit}</div>
      <div style="margin-top:4px">${typeBadgeHtml(newSlot.type)}</div>
    </div>
    <p style="font-size:14px;margin-bottom:16px">Du hast bereits die maximale Anzahl aktiver Termine erreicht. Wähle einen deiner bestehenden Termine zum Tauschen:</p>
    ${tauschRows || '<p class="text-muted">Keine Termine zum Tauschen verfügbar.</p>'}
  `);
};

window.doTausch = async function(oldSlotId, newSlotId, schuelerId, lehrerUid) {
  // Storniere alten Termin
  const [oldSnap, schuelerSnap, lehrerSnap, newSlotSnap] = await Promise.all([
    getDoc(doc(db,'slots',oldSlotId)),
    getDoc(doc(db,'schueler',schuelerId)),
    getDoc(doc(db,'users',lehrerUid)),
    getDoc(doc(db,'slots',newSlotId))
  ]);
  const s = schuelerSnap.data();
  const lehrer = lehrerSnap.data();
  const newSlot = newSlotSnap.data();

  // Alten Slot freigeben
  await updateDoc(doc(db,'slots',oldSlotId), { bookedBy: null, bookedAt: null });
  // Neuen Slot buchen (bookedCount bleibt gleich da 1:1 Tausch)
  await updateDoc(doc(db,'slots',newSlotId), { bookedBy: schuelerId, bookedAt: serverTimestamp() });

  // E-Mail Bestätigung für neuen Termin
  if (s.email) {
    await triggerEmail('buchungsbestaetigung', {
      to: s.email,
      schuelerName: s.fname + ' ' + s.lname,
      lehrerName: lehrer.fname + ' ' + lehrer.lname,
      datum: newSlot.startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}),
      von: fmtTime(newSlot.startTime), bis: fmtTime(newSlot.endTime),
      typ: typeLabel(newSlot.type), slotId: newSlotId, schuelerId, lehrerUid
    });
  }
  // Freier Slot Benachrichtigung
  await triggerEmail('stornierung_freigeworden', {
    datum: oldSnap.data().startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}),
    von: fmtTime(oldSnap.data().startTime), bis: fmtTime(oldSnap.data().endTime),
    typ: typeLabel(oldSnap.data().type),
    lehrerName: lehrer.fname+' '+lehrer.lname,
    lehrerUid, slotId: oldSlotId
  });

  toast('Termin erfolgreich getauscht!', 'success');
  closeModal();
  showBookingPage(schuelerId, lehrerUid);
};

window.bookSlot = async function(slotId, schuelerId, lehrerUid) {
  const [schuelerSnap, slotSnap, lehrerSnap] = await Promise.all([
    getDoc(doc(db,'schueler',schuelerId)),
    getDoc(doc(db,'slots',slotId)),
    getDoc(doc(db,'users',lehrerUid))
  ]);
  const s = schuelerSnap.data();
  const slot = slotSnap.data();
  const lehrer = lehrerSnap.data();

  // Gesamtkontingent prüfen
  const max = s.maxFahrstunden || 0;
  if (max > 0 && (s.bookedCount||0) >= max) {
    return toast('Gesamtkontingent erschöpft – Buchung nicht möglich.', 'error');
  }

  // Aktive Termine prüfen – falls Limit erreicht Tausch-Modal öffnen
  const maxAktiv = s.maxAktiveTermine || 0;
  if (maxAktiv > 0) {
    const now = new Date();
    const aktiveSnap = await getDocs(query(collection(db,'slots'),
      where('lehrerUid','==',lehrerUid),
      where('bookedBy','==',schuelerId),
      orderBy('startTime')
    ));
    const aktive = aktiveSnap.docs.filter(d => d.data().startTime.toDate() > now);
    if (aktive.length >= maxAktiv) {
      return openTauschModal(slotId, schuelerId, lehrerUid);
    }
  }

  await updateDoc(doc(db,'slots',slotId), { bookedBy: schuelerId, bookedAt: serverTimestamp() });
  await updateDoc(doc(db,'schueler',schuelerId), { bookedCount: (s.bookedCount||0) + 1 });
  if (s.email) {
    await triggerEmail('buchungsbestaetigung', {
      to: s.email,
      schuelerName: s.fname + ' ' + s.lname,
      lehrerName: lehrer.fname + ' ' + lehrer.lname,
      datum: slot.startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}),
      von: fmtTime(slot.startTime), bis: fmtTime(slot.endTime),
      typ: typeLabel(slot.type), slotId, schuelerId, lehrerUid
    });
  }
  toast('Termin gebucht!', 'success');
  showBookingPage(schuelerId, lehrerUid);
};

window.cancelMyBooking = async function(slotId, schuelerId, lehrerUid) {
  const [slotSnap, schuelerSnap, lehrerSnap] = await Promise.all([
    getDoc(doc(db,'slots',slotId)),
    getDoc(doc(db,'schueler',schuelerId)),
    getDoc(doc(db,'users',lehrerUid))
  ]);
  const slot = slotSnap.data();
  const s = schuelerSnap.data();
  const lehrer = lehrerSnap.data();
  await updateDoc(doc(db,'slots',slotId), { bookedBy: null, bookedAt: null });
  await updateDoc(doc(db,'schueler',schuelerId), { bookedCount: Math.max(0,(s.bookedCount||1)-1) });
  const slotInfo = {
    datum: slot.startTime.toDate().toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'}),
    von: fmtTime(slot.startTime), bis: fmtTime(slot.endTime),
    typ: typeLabel(slot.type), lehrerName: lehrer.fname+' '+lehrer.lname,
    lehrerUid, slotId
  };
  await triggerEmail('stornierung_freigeworden', slotInfo);
  await triggerEmail('warteliste_frei', slotInfo);
  toast('Termin storniert.', 'success');
  showBookingPage(schuelerId, lehrerUid);
};

// ──────────────────────────────
// Check URL on load
// ──────────────────────────────
const params = new URLSearchParams(window.location.search);
if (params.get('schueler') && params.get('lehrer')) {
  showBookingPage(params.get('schueler'), params.get('lehrer'));
}
</script>
